name: Bug Report
description: 버그를 제보합니다
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 재현할 수 있는 단계를 알려주세요.
      placeholder: |
        1. `tossctl ...` 실행
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 어떻게 동작해야 하나요?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: tossctl version
      description: "`tossctl version` 출력값"
      placeholder: "0.3.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
